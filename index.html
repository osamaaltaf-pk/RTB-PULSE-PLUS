<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RTB Route Board</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 12c0-3 2-5 5-5M21 12c0-3-2-5-5-5M6 12c0 3.5 2.5 6 6 6s6-2.5 6-6" stroke="#06201D" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="1.6" fill="#06201D"/></svg>
      </div>
      <div>
        <h1>RTB Route Board</h1>
        <div class="sub">Run one caller ID against every configured buyer route</div>
      </div>
    </div>
    <div class="top-actions">
      <a href="/admin.html" class="btn btn-ghost">Manage routes</a>
    </div>
  </div>

  <form id="query-form" class="panel query-bar">
    <div class="field">
      <label for="caller-id">Caller ID</label>
      <input type="text" id="caller-id" placeholder="19995551234" autocomplete="off" />
    </div>
    <div class="field zip" id="zip-field" style="display:none;">
      <label for="zip">Zip code</label>
      <input type="text" id="zip" placeholder="90210" autocomplete="off" />
    </div>
    <button type="submit" class="btn btn-primary" id="run-btn">
      <span class="pulse-dot" style="display:none" id="run-dot"></span>
      Run check
    </button>
  </form>

  <div id="results"></div>

</div>

<div class="toast" id="toast"></div>

<script src="/js/defaults.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
