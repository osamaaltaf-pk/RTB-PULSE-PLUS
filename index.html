<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Webster Solutions LLC — RTB Route Board</title>
<meta name="description" content="Real-time RTB route checker — fire a caller ID against every configured buyer route and see payouts instantly." />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 12c0-3 2-5 5-5M21 12c0-3-2-5-5-5M6 12c0 3.5 2.5 6 6 6s6-2.5 6-6" stroke="#06201D" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="1.6" fill="#06201D"/></svg>
      </div>
      <div>
        <h1>Webster Solutions LLC</h1>
        <div class="sub">RTB Route Board — Fire a caller ID against every configured buyer route</div>
      </div>
    </div>
    <div class="top-actions">
      <a href="/admin.html" class="btn btn-ghost">Manage routes</a>
    </div>
  </div>

  <!-- Query bar -->
  <form id="query-form" class="panel query-bar">
    <div class="query-inputs">
      <div class="query-input-row">
        <input type="text" id="caller-id" placeholder="Caller ID — e.g. 19995551234" autocomplete="off" />
        <button type="button" class="btn-icon-copy" id="copy-caller-btn" title="Copy caller ID">
          <svg viewBox="0 0 20 20" fill="none"><rect x="7" y="7" width="10" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 13H4a2 2 0 01-2-2V4a2 2 0 012-2h7a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
      <div class="query-input-row zip-row" id="zip-field" style="display:none;">
        <input type="text" id="zip" placeholder="Zip code — e.g. 90210" autocomplete="off" />
        <button type="button" class="btn-icon-copy" id="copy-zip-btn" title="Copy zip">
          <svg viewBox="0 0 20 20" fill="none"><rect x="7" y="7" width="10" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 13H4a2 2 0 01-2-2V4a2 2 0 012-2h7a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn btn-fire" id="run-btn">
      <span class="pulse-dot" style="display:none" id="run-dot"></span>
      <span id="fire-emoji">🔥</span>
      Fire
    </button>
  </form>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar" style="display:none;">
    <div class="stat-card">
      <div class="stat-val" id="stat-fired">0</div>
      <div class="stat-label">FIRED</div>
    </div>
    <div class="stat-card">
      <div class="stat-val eligible" id="stat-routes">0</div>
      <div class="stat-label">ROUTES</div>
    </div>
    <div class="stat-card">
      <div class="stat-val payout" id="stat-maxpay">—</div>
      <div class="stat-label">MAX PAY</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-time">—</div>
      <div class="stat-label">TIME</div>
    </div>
  </div>

  <div id="results"></div>

</div>

<div class="toast" id="toast"></div>

<script src="/js/defaults.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
